name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubicloud
    timeout-minutes: 5
    outputs:
      common-ts: ${{ steps.filter.outputs.common-ts }}
      posthog-types: ${{ steps.filter.outputs.posthog-types }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            common-ts:
              - 'common-ts/**'
              - 'bun.lock'
              - 'package.json'
            posthog-types:
              - 'posthog-types/**'
              - 'bun.lock'
              - 'package.json'

  common-ts:
    needs: changes
    if: ${{ needs.changes.outputs.common-ts == 'true' }}
    runs-on: ubicloud
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./common-ts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-common-ts
        with:
          working-directory: ./common-ts

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test:ci

  ci-passed:
    # TODO: add posthog-types to needs when its job is re-enabled below
    needs: [changes, common-ts]
    if: always()
    runs-on: ubicloud
    timeout-minutes: 5
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          result="${{ join(needs.*.result, ',') }}"
          echo "Job results: $result"
          if [[ "$result" =~ (failure|cancelled) ]]; then
            exit 1
          fi

