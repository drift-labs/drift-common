name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubicloud
    timeout-minutes: 5
    outputs:
      common-ts: ${{ steps.filter.outputs.common-ts }}
      posthog-types: ${{ steps.filter.outputs.posthog-types }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2
        id: filter
        with:
          filters: |
            common-ts:
              - 'common-ts/**'
              - 'bun.lock'
              - 'package.json'
            posthog-types:
              - 'posthog-types/**'
              - 'bun.lock'
              - 'package.json'

  common-ts:
    needs: changes
    if: ${{ needs.changes.outputs.common-ts == 'true' }}
    runs-on: ubicloud
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./common-ts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-common-ts
        with:
          working-directory: ./common-ts

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test:ci

  ci-passed:
    # TODO: add posthog-types to needs when its job is re-enabled below
    needs: [changes, common-ts]
    if: always()
    runs-on: ubicloud
    timeout-minutes: 5
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          result="${{ join(needs.*.result, ',') }}"
          echo "Job results: $result"
          if [[ "$result" =~ (failure|cancelled) ]]; then
            exit 1
          fi

