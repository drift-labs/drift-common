name: release
run-name: release (${{ github.event.head_commit.message }})

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      common-ts--release_created: ${{ steps.rp.outputs['common-ts--release_created'] }}
      common-ts--version: ${{ steps.rp.outputs['common-ts--version'] }}
      common-ts--tag_name: ${{ steps.rp.outputs['common-ts--tag_name'] }}
      posthog-types--release_created: ${{ steps.rp.outputs['posthog-types--release_created'] }}
      posthog-types--version: ${{ steps.rp.outputs['posthog-types--version'] }}
      posthog-types--tag_name: ${{ steps.rp.outputs['posthog-types--tag_name'] }}
    steps:
      - name: Mint App token (drift-common)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-common-ts:
    needs: release-please
    if: ${{ needs.release-please.outputs['common-ts--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing OIDC
    defaults:
      run:
        working-directory: ./common-ts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs['common-ts--tag_name'] }}

      - uses: ./.github/actions/setup-common-ts
        with:
          registry-url: 'https://registry.npmjs.org'
          working-directory: ./common-ts

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test:ci

      - name: Publish to npm
        run: npm publish --access=public --provenance

  # publish-posthog-types:
  #   needs: release-please
  #   if: ${{ needs.release-please.outputs['posthog-types--release_created'] == 'true' }}
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: ./posthog-types
  #   steps:
  #     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #       with:
  #         ref: ${{ needs.release-please.outputs['posthog-types--tag_name'] }}

  #     - name: Setup Node
  #       uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
  #       with:
  #         node-version: '24.x.x'
  #         registry-url: 'https://registry.npmjs.org'

  #     - name: Setup bun
  #       uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
  #       with:
  #         bun-version: 1.2.15

  #     - name: Install dependencies
  #       run: bun install --frozen-lockfile

  #     - name: Build
  #       run: bun run build

  #     - name: Upgrade npm for trusted publishing
  #       run: npm install -g npm@latest

  #     - name: Publish to npm
  #       run: npm publish --access=public --provenance

  dispatch-downstream:
    needs: [release-please, publish-common-ts]
    if: ${{ needs.release-please.outputs['common-ts--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        repo: [dlob-server, internal-keeper-bot, history-server]
    steps:
      - name: Mint App token for downstream repo
        id: dispatch-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: drift-labs
          repositories: ${{ matrix.repo }}

      - name: Emit dispatch event
        env:
          TOKEN: ${{ steps.dispatch-token.outputs.token }}
          VERSION: ${{ needs.release-please.outputs['common-ts--version'] }}
          REPO: ${{ matrix.repo }}
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/drift-labs/${REPO}/dispatches" \
            -d "{\"event_type\":\"drift-common-update\",\"client_payload\":{\"version\":\"${VERSION}\"}}"

  notify-failure:
    needs: [release-please, publish-common-ts, dispatch-downstream]
    if: ${{ failure() || cancelled() }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          channel-id: '#code-review'
          slack-message: '<!here> ❌ drift-common release failed! Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
