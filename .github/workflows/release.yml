name: release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm Trusted Publishing OIDC

defaults:
  run:
    shell: bash

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      common-ts--release_created: ${{ steps.rp.outputs['common-ts--release_created'] }}
      common-ts--version: ${{ steps.rp.outputs['common-ts--version'] }}
      common-ts--tag_name: ${{ steps.rp.outputs['common-ts--tag_name'] }}
      posthog-types--release_created: ${{ steps.rp.outputs['posthog-types--release_created'] }}
      posthog-types--version: ${{ steps.rp.outputs['posthog-types--version'] }}
      posthog-types--tag_name: ${{ steps.rp.outputs['posthog-types--tag_name'] }}
    steps:
      - name: Mint App token (drift-common)
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.3.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-common-ts:
    needs: release-please
    if: ${{ needs.release-please.outputs['common-ts--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./common-ts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-please.outputs['common-ts--tag_name'] }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.x.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test:ci

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --access=public --provenance

  # publish-posthog-types:
  #   needs: release-please
  #   if: ${{ needs.release-please.outputs['posthog-types--release_created'] == 'true' }}
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: ./posthog-types
  #   steps:
  #     - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
  #       with:
  #         ref: ${{ needs.release-please.outputs['posthog-types--tag_name'] }}

  #     - name: Setup Node
  #       uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
  #       with:
  #         node-version: '24.x.x'
  #         registry-url: 'https://registry.npmjs.org'

  #     - name: Setup bun
  #       uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
  #       with:
  #         bun-version: 1.2.15

  #     - name: Install dependencies
  #       run: bun install --frozen-lockfile

  #     - name: Build
  #       run: bun run build

  #     - name: Upgrade npm for trusted publishing
  #       run: npm install -g npm@latest

  #     - name: Publish to npm
  #       run: npm publish --access=public --provenance

  dispatch-downstream:
    needs: [release-please, publish-common-ts]
    if: ${{ needs.release-please.outputs['common-ts--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [dlob-server, internal-keeper-bot, history-server]
    steps:
      - name: Mint App token for downstream repo
        id: dispatch-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: drift-labs
          repositories: ${{ matrix.repo }}

      - name: Emit dispatch event
        env:
          TOKEN: ${{ steps.dispatch-token.outputs.token }}
          VERSION: ${{ needs.release-please.outputs['common-ts--version'] }}
          REPO: ${{ matrix.repo }}
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/drift-labs/${REPO}/dispatches" \
            -d "{\"event_type\":\"drift-common-update\",\"client_payload\":{\"version\":\"${VERSION}\"}}"

  notify-failure:
    needs: [release-please, publish-common-ts, dispatch-downstream]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          channel-id: '#code-review'
          slack-message: '<!here> ❌ drift-common release failed! Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
