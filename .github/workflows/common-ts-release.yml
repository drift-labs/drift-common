name: common-ts-release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    shell: bash
    working-directory: .

jobs:
  tests:
    runs-on: ubicloud
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./common-ts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.x.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test:ci

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: common-ts-lib
          path: common-ts/lib
          retention-days: 1
          if-no-files-found: error

  check-for-common-ts-changes:
    runs-on: ubicloud
    outputs:
      common-ts: ${{ steps.filter.outputs.common-ts }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2
        id: filter
        with:
          filters: |
            common-ts:
              - 'common-ts/**'

  publish:
    runs-on: ubuntu-latest
    needs: [tests, check-for-common-ts-changes]
    if: ${{ github.ref == 'refs/heads/master' && needs.check-for-common-ts-changes.outputs.common-ts == 'true' }}
    permissions:
      contents: write # push the version bump commit
      id-token: write # mint OIDC token for npm Trusted Publishing
    defaults:
      run:
        working-directory: ./common-ts
    outputs:
      version: ${{ steps.git-commit.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.x.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Download latest npm # ensures that npm version supports trusted publishing
        run: npm install -g npm@latest

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: common-ts-lib
          path: common-ts/lib

      - name: Update package version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version);")
          npm version patch
          echo "PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version);")" >> $GITHUB_ENV

      - name: Git commit version bump
        id: git-commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ..
          git commit -a -m "common-ts: release v$PACKAGE_VERSION [skip ci]"
          git pull --rebase origin master
          git push origin HEAD || {
            echo "Push failed. Retrying after pulling latest changes..."
            git pull --rebase origin master
            git push origin HEAD
          }
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish --access=public --provenance

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          channel-id: '#code-review'
          slack-message: '<!here> ❌ common-ts deployment failed! Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

  emit-dispatch-events:
    runs-on: ubicloud
    needs: [publish, check-for-common-ts-changes]
    if: ${{ github.ref == 'refs/heads/master' && needs.check-for-common-ts-changes.outputs.common-ts == 'true' }}
    strategy:
      matrix:
        repo: ['dlob-server', 'internal-keeper-bot', 'history-server']
    steps:
      - name: Checkout code with new updated version
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Emit dispatch event
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/drift-labs/${{ matrix.repo }}/dispatches" \
            -d "{\"event_type\": \"drift-common-update\", \"client_payload\": {
              \"version\": \"$VERSION\"
            }}"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VERSION: ${{ needs.publish.outputs.version }}
        working-directory: ./common-ts
