name: react

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    shell: bash
    working-directory: .

jobs:
  build:
    runs-on: ubicloud
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./react
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.x.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: 1.3.9

      - name: Install and build common-ts
        run: bun install && bun run build
        working-directory: ./common-ts

      - name: Install and build icons
        run: bun install && bun run build
        working-directory: ./icons

      - name: Install and build react
        run: bun install && bun run build
